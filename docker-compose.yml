version: '3.8'

services:
  # 1. Redis Servisi (Hata aldığın eksik parça)
  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Verilerin silinmemesini istersen alttaki satırı aktif edebilirsin
    # volumes:
    #   - redis_data:/data

  # 2. Google Maps Scraper
  gmaps-scraper:
    image: gosom/google-maps-scraper:latest
    container_name: google_maps_scraper
    ports:
      - "8085:8080"
    volumes:
      - ./gmapsdata:/gmapsdata
    command: ["-data-folder", "/gmapsdata"]
    restart: unless-stopped
    depends_on:
      - redis

  # 3. Senin Python Uygulaman (Wrapper)
  wrapper:
    build: .
    container_name: gmaps_wrapper
    ports:
      - "8003:8000"
    volumes:
      - ./gmapsdata:/app/gmapsdata
    environment:
      - GOSOM_API_URL=http://gmaps-scraper:8080/api/v1
      - DATA_ROOT=gmapsdata/json
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - gmaps-scraper
      - redis
    restart: unless-stopped

# volumes:
#   redis_data:
